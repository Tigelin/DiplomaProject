{% extends "journal/base.html" %}

{% block title %}Планы дисциплин{% endblock %}

{% block content %}

<div class="card">
    <div class="card-header bg-primary text-white">
        <h4 class="mb-0"><i class="bi bi-book"></i> Планы дисциплин</h4>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Название</th>
                        <th>Количество часов</th>
                    </tr>
                </thead>
                <tbody>

                    {% for plan in plans %}

                    <tr>
                        <td>{{ plan.name }}</td>
                        <td>{{ plan.total_hours }}</td>
                    </tr>

                    {% empty %}

                    <tr>
                        <td colspan="2" class="text-center">
                            Нет планов дисциплин.
                        </td>
                    </tr>

                    {% endfor %}

                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}
